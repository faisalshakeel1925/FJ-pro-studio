<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FJ Pro AI Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08090f;color:#e8eaf0;font-family:sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#161925;border:1px solid #232640;border-radius:20px;padding:40px;width:90%;max-width:400px;text-align:center}
h1{font-size:26px;font-weight:900;background:linear-gradient(135deg,#7c5cfc,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
p{color:#6b7280;font-size:14px;margin-bottom:30px}
input{width:100%;background:#10121c;border:1.5px solid #232640;border-radius:10px;padding:12px;color:#e8eaf0;font-size:15px;margin-bottom:14px;outline:none}
button{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;background:linear-gradient(135deg,#7c5cfc,#f59e0b);color:#fff}
</style>
</head>
<body>
<div class="box">
<h1>FJ Pro AI Studio</h1>
<p>AI Video Creator — Pakistan</p>
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button>Login Karein</button>
</div>
</body>
</html>
